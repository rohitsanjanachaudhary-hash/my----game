<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;padding:50px}
.box{background:#1e293b;width:350px;margin:auto;padding:30px;border-radius:15px}
input{width:90%;padding:12px;margin:10px 0;border:none;border-radius:8px}
button{background:orange;padding:12px 20px;border:none;border-radius:8px}

</head>
<body>
<div class="box">
<h1>👤 User Login</h1>
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">
<button>Login</button>
</div>
</body>
</html>
