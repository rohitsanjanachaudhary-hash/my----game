<!DOCTYPE html>
<html>
<head>
    <title>Fantasy Game Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            color: orange;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
        }

        button {
            padding: 10px;
            margin: 5px;
            border: none;
            background: orange;
            color: black;
            border-radius: 5px;
            cursor: pointer;
        }

        .player {
            padding: 10px;
            margin: 5px;
            background: #334155;
            border-radius: 8px;
            cursor: pointer;
        }

        .selected {
            background: green;
        }
    </style>
</head>

<body>

<h1>🔥 Fantasy Game Pro</h1>

<div class="card">
    <h3>Coins: <span id="coins">100</span></h3>

    <h3>Add Coins</h3>
    <button onclick="addCoins(50)">+50</button>
    <button onclick="addCoins(100)">+100</button>
</div>

<div class="card">
    <h3>Select Team (Max 5)</h3>

    <div class="player" onclick="selectPlayer(this)">Virat</div>
    <div class="player" onclick="selectPlayer(this)">Rohit</div>
    <div class="player" onclick="selectPlayer(this)">Dhoni</div>
    <div class="player" onclick="selectPlayer(this)">Hardik</div>
    <div class="player" onclick="selectPlayer(this)">Gill</div>
    <div class="player" onclick="selectPlayer(this)">Bumrah</div>
    <div class="player" onclick="selectPlayer(this)">Shami</div>
    <div class="player" onclick="selectPlayer(this)">Rahul</div>
    <div class="player" onclick="selectPlayer(this)">Pant</div>
    <div class="player" onclick="selectPlayer(this)">Jadeja</div>
</div>
<button onclick="submitTeam()">Join Match</button>
<script>
let coins = 100;
let selected = 0;

function addCoins(amount) {
    coins += amount;
    document.getElementById("coins").innerText = coins;
}

function selectPlayer(el) {
    if (el.classList.contains("selected")) {
        el.classList.remove("selected");
        selected--;
    } else {
        if (selected >= 5) {
            alert("Max 5 players allowed!");
            return;
        }
        el.classList.add("selected");
        selected++;
    }
}
</script>

</body>
</html>
