<!DOCTYPE html>
<html>
<head>
    <title>Fantasy Game Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            color: orange;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            margin: 10px;
            border-radius: 10px;
        }

        button {
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            background: orange;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        .player {
            background: #334155;
            margin: 5px;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
        }

        .selected {
            background: green;
        }
    </style>
</head>

<body>

    <h1>🔥 Fantasy Game Pro</h1>

    <h3>Coins: <span id="coins">100</span></h3>

    <div class="card">
        <h3>Add Coins</h3>
        <button onclick="addCoins(50)">₹10 → 50 Coins</button>
        <button onclick="addCoins(100)">₹20 → 100 Coins</button>
    </div>

    <div class="card">
        <h3>Select Team (Max 5)</h3>

        <div class="player" onclick="selectPlayer(this)">Virat</div>
        <div class="player" onclick="selectPlayer(this)">Rohit</div>
        <div class="player" onclick="selectPlayer(this)">Dhoni</div>
        <div class="player" onclick="selectPlayer(this)">Hardik</div>
        <div class="player" onclick="selectPlayer(this)">Gill</div>
        <div class="player" onclick="selectPlayer(this)">Bumrah</div>
        <div class="player" onclick="selectPlayer(this)">Shami</div>
        <div class="player" onclick="selectPlayer(this)">Rahul</div>
        <div class="player" onclick="selectPlayer(this)">Pant</div>
        <div class="player" onclick="selectPlayer(this)">Jadeja</div>

        <br><br>

        <button onclick="submitTeam()">Join Match</button>
    </div>

    <script>
        let coins = 100;
        let selectedPlayers = [];

        function addCoins(amount) {
            coins += amount;
            document.getElementById("coins").innerText = coins;
        }

        function selectPlayer(el) {
            let name = el.innerText;

            if (selectedPlayers.includes(name)) {
                selectedPlayers = selectedPlayers.filter(p => p !== name);
                el.classList.remove("selected");
            } else {
                if (selectedPlayers.length >= 5) {
                    alert("Max 5 players allowed!");
                    return;
                }
                selectedPlayers.push(name);
                el.classList.add("selected");
            }
        }

        function submitTeam() {
            if (selectedPlayers.length !== 5) {
                alert("Select exactly 5 players!");
                return;
            }

            if (coins < 50) {
                alert("Not enough coins!");
                return;
            }

            coins -= 50;
            document.getElementById("coins").innerText = coins;

            alert("Team Joined Successfully ✅");
        }
    </script>

</body>
</html>
