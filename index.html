<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Game Pro</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: orange;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            width: 80%;
            border-radius: 12px;
        }

        .coins {
            font-size: 22px;
            margin-bottom: 20px;
            color: gold;
        }

        button {
            background: orange;
            color: black;
            border: none;
            padding: 12px 20px;
            margin: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #ffb347;
        }

        .player {
            background: #334155;
            padding: 12px;
            margin: 8px auto;
            border-radius: 8px;
            cursor: pointer;
            width: 80%;
        }

        .selected {
            background: green !important;
        }

        input {
            padding: 10px;
            width: 250px;
            border-radius: 8px;
            border: none;
            margin-top: 10px;
        }

        #selectedTeam {
            margin-top: 15px;
            color: lightgreen;
        }

        #withdrawMsg {
            margin-top: 10px;
            color: cyan;
        }
    </style>
</head>
<body>

    <h1>🏏 Fantasy Game Pro</h1>

    <div class="card">
        <div class="coins">Coins: <span id="coins">90</span></div>

        <h2>💰 Add Coins</h2>
        <button onclick="addCoins(50)">₹10 → 50 Coins</button>
        <button onclick="addCoins(100)">₹20 → 100 Coins</button>
    </div>

    <div class="card">
        <h2>Select Team (Max 5)</h2>

        <div class="player" onclick="selectPlayer(this)">Virat</div>
        <div class="player" onclick="selectPlayer(this)">Rohit</div>
        <div class="player" onclick="selectPlayer(this)">Dhoni</div>
        <div class="player" onclick="selectPlayer(this)">Hardik</div>
        <div class="player" onclick="selectPlayer(this)">Gill</div>
        <div class="player" onclick="selectPlayer(this)">Bumrah</div>
        <div class="player" onclick="selectPlayer(this)">Shami</div>

        <div id="selectedTeam"></div>
    </div>

    <div class="card">
        <h2>💸 Withdraw Coins</h2>
        <input type="text" id="upi" placeholder="Enter UPI ID">
        <br>
        <button onclick="withdraw()">Withdraw 100 Coins</button>
        <div id="withdrawMsg"></div>
    </div>

    <script>
        let coins = 90;
        let selectedPlayers = [];

        function addCoins(amount) {
            coins += amount;
            document.getElementById("coins").innerText = coins;
        }

        function selectPlayer(element) {
            let name = element.innerText;

            if (element.classList.contains("selected")) {
                element.classList.remove("selected");
                selectedPlayers = selectedPlayers.filter(p => p !== name);
            } else {
                if (selectedPlayers.length >= 5) {
                    alert("Max 5 players!");
                    return;
                }

                element.classList.add("selected");
                selectedPlayers.push(name);
            }

            document.getElementById("selectedTeam").innerText =
                "Selected: " + selectedPlayers.join(", ");
        }

        function withdraw() {
            let upi = document.getElementById("upi").value;

            if (!upi) {
                alert("Enter UPI ID");
                return;
            }

            if (coins < 100) {
                alert("Not enough coins");
                return;
            }

            coins -= 100;
            document.getElementById("coins").innerText = coins;

            document.getElementById("withdrawMsg").innerText =
                "✅ ₹100 request sent to " + upi;
        }
    </script>

</body>
</html>
