<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantasy Game App</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#f4f6f9;
}

header {
    background:#0d6efd;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
}

.container {
    padding:20px;
}

.card {
    background:white;
    padding:20px;
    margin:15px 0;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button {
    padding:10px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

.green { background:green; color:white; }
.red { background:red; color:white; }
.blue { background:#0d6efd; color:white; }

input {
    padding:10px;
    width:100%;
    margin:10px 0;
}
</style>
</head>

<body>

<header>🔥 Fantasy Game App</header>

<div class="container">

<!-- LOGIN -->
<div class="card">
<h3>Login</h3>
<input type="text" id="username" placeholder="Enter Name">
<button class="blue" onclick="login()">Login</button>
</div>

<!-- WALLET -->
<div class="card">
<h3>💰 Wallet</h3>
<p>Balance: ₹<span id="balance">0</span></p>

<button class="green" onclick="addMoney()">Add Money</button>
<button class="red" onclick="withdrawMoney()">Withdraw</button>
</div>

<!-- GAME -->
<div class="card">
<h3>🎮 Match</h3>
<p>Join contest and win money</p>
<button class="blue" onclick="joinGame()">Join Match (₹50)</button>
</div>

</div>

<script>
let balance = 0;

// LOGIN
function login() {
    let name = document.getElementById("username").value;
    if(name == "") {
        alert("Enter name");
        return;
    }
    alert("Welcome " + name);
}

// UPDATE BALANCE
function updateBalance() {
    document.getElementById("balance").innerText = balance;
}

// ADD MONEY
function addMoney() {
    let amount = prompt("Enter amount to add:");
    if(!amount) return;
    balance += parseInt(amount);
    updateBalance();
    alert("Money Added!");
}

// WITHDRAW
function withdrawMoney() {
    let amount = prompt("Enter withdraw amount:");
    if(!amount) return;

    if(amount > balance) {
        alert("Insufficient Balance");
        return;
    }

    balance -= parseInt(amount);
    updateBalance();
    alert("Withdrawal Successful!");
}

// JOIN GAME
function joinGame() {
    if(balance < 50) {
        alert("Add money first");
        return;
    }

    balance -= 50;
    updateBalance();

    let win = Math.random() > 0.5;

    if(win) {
        balance += 100;
        alert("🎉 You Won ₹100!");
    } else {
        alert("❌ You Lost");
    }

    updateBalance();
}
</script>

</body>
</html>
